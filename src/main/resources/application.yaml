spring:
  application:
    name: x402-payment-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/x402}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:x402}
    password: ${DB_PASSWORD:x402}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

x402:
  eip3009:
    chain-id: ${X402_EIP3009_CHAIN_ID:8453}
    token-name: ${X402_EIP3009_TOKEN_NAME:USD Coin}
    token-version: ${X402_EIP3009_TOKEN_VERSION:2}
    token-contract: ${X402_EIP3009_TOKEN_CONTRACT:0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48}
  policy:
    max-amount: ${X402_POLICY_MAX_AMOUNT:10000}
    allowed-merchants: ${X402_ALLOWED_MERCHANTS:demo-merchant,lab-merchant}
  challenge:
    report:
      merchant-id: ${X402_CHALLENGE_REPORT_MERCHANT_ID:demo-merchant}
      endpoint: ${X402_CHALLENGE_REPORT_ENDPOINT:/x402/protected/report}
      asset: ${X402_CHALLENGE_REPORT_ASSET:USDC}
      amount: ${X402_CHALLENGE_REPORT_AMOUNT:1000}
      payee: ${X402_CHALLENGE_REPORT_PAYEE:merchant-vault}
server:
  port: 8081